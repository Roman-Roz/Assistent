name: Security Issue
description: Report a security vulnerability
title: "[Security]: "
labels: ["security", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        **⚠️ IMPORTANT: For sensitive security issues**
        
        Please do not create a public GitHub issue for security vulnerabilities. 
        Instead, email us at security@example.com with details of the issue.
        
        See our [Security Policy](../SECURITY.md) for more information.

  - type: dropdown
    id: severity
    attributes:
      label: Severity (if disclosing publicly)
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Describe the vulnerability
      description: Provide a clear description of the security issue (only if safe to disclose publicly)
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Potential impact
      description: What could an attacker do with this vulnerability?

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce (if safe to share)
      description: Only include if this is already publicly known or a low-severity issue

  - type: checkboxes
    id: checklist
    attributes:
      label: Confirmation
      options:
        - label: I have read the [Security Policy](../SECURITY.md)
          required: true
        - label: This is not a duplicate of an existing report
          required: true
